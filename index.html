<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCHD Traffic Signal Inventory</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f2f5; color: #222; }

  header {
    background: #1a3a5c;
    color: white;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  header p { font-size: 0.8rem; opacity: 0.8; }

  .search-bar {
    background: white;
    padding: 16px 24px;
    border-bottom: 1px solid #ddd;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .search-bar input {
    flex: 1; min-width: 200px;
    padding: 9px 14px;
    border: 2px solid #1a3a5c;
    border-radius: 6px;
    font-size: 0.95rem;
    outline: none;
  }
  .search-bar input:focus { border-color: #2e6da4; box-shadow: 0 0 0 3px rgba(46,109,164,0.15); }
  .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-group select {
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 0.85rem;
    background: white;
    cursor: pointer;
  }
  .filter-group select:focus { outline: none; border-color: #1a3a5c; }

  .stats {
    padding: 8px 24px;
    background: #e8eef5;
    font-size: 0.82rem;
    color: #555;
    border-bottom: 1px solid #ddd;
  }

  .table-wrap {
    padding: 16px 24px;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    font-size: 0.83rem;
  }
  thead tr { background: #1a3a5c; color: white; }
  thead th {
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { background: #2e6da4; }
  thead th.sorted-asc::after { content: ' ▲'; font-size: 0.7em; }
  thead th.sorted-desc::after { content: ' ▼'; font-size: 0.7em; }

  tbody tr { border-bottom: 1px solid #eee; cursor: pointer; }
  tbody tr:hover { background: #f0f6ff; }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 8px 12px; white-space: nowrap; }
  td.ts-num { font-weight: 700; color: #1a3a5c; }

  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .badge-ts1 { background: #dbeafe; color: #1d4ed8; }
  .badge-ts2 { background: #dcfce7; color: #15803d; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 10px;
    padding: 24px;
    max-width: 700px;
    width: 95%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    position: relative;
  }
  .modal-close {
    position: absolute; top: 14px; right: 16px;
    font-size: 1.4rem; cursor: pointer; color: #888;
    background: none; border: none;
  }
  .modal-close:hover { color: #333; }
  .modal h2 { font-size: 1.2rem; color: #1a3a5c; margin-bottom: 4px; }
  .modal .subtitle { font-size: 0.9rem; color: #666; margin-bottom: 16px; }
  .modal-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .modal-section { }
  .modal-section h3 { font-size: 0.75rem; text-transform: uppercase; color: #888; letter-spacing: 0.05em; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
  .modal-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.85rem; border-bottom: 1px dotted #f0f0f0; }
  .modal-row .label { color: #666; }
  .modal-row .value { font-weight: 600; color: #222; }
  .lamp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 4px; }
  .lamp-cell { background: #f8f8f8; border-radius: 6px; padding: 6px; text-align: center; }
  .lamp-cell .lc-label { font-size: 0.7rem; color: #888; }
  .lamp-cell .lc-val { font-size: 1rem; font-weight: 700; color: #1a3a5c; }
  .map-btn {
    display: inline-block;
    margin-top: 14px;
    background: #1a3a5c;
    color: white;
    padding: 9px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 600;
  }
  .map-btn:hover { background: #2e6da4; }

  .no-results { text-align: center; padding: 40px; color: #888; font-size: 1rem; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🚦 CCHD Traffic Signal Inventory</h1>
    <p>Cook County Highway Department</p>
  </div>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍  Search by T/S#, street name, controller, patrol..." oninput="applyFilters()">
  <div class="filter-group">
    <select id="filterPatrol" onchange="applyFilters()">
      <option value="">All Patrols</option>
    </select>
    <select id="filterTS" onchange="applyFilters()">
      <option value="">TS1 & TS2</option>
      <option value="TS1">TS1</option>
      <option value="TS2">TS2</option>
    </select>
    <select id="filterController" onchange="applyFilters()">
      <option value="">All Controllers</option>
    </select>
  </div>
</div>

<div class="stats" id="stats">Loading...</div>

<div class="table-wrap">
  <table id="mainTable">
    <thead>
      <tr>
        <th onclick="sortBy('T/S#')">T/S #</th>
        <th onclick="sortBy('MAIN STREET')">Main Street</th>
        <th onclick="sortBy('SIDE STREET')">Side Street</th>
        <th onclick="sortBy('CONTROLLER')">Controller</th>
        <th onclick="sortBy('MONITOR')">Monitor</th>
        <th onclick="sortBy('BBU')">BBU</th>
        <th onclick="sortBy('TS1/TS2')">TS1/TS2</th>
        <th onclick="sortBy('Patrol')">Patrol</th>
        <th onclick="sortBy('Relamp Date')">Relamp</th>
        <th onclick="sortBy('Battery Date')">Battery</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="no-results" id="noResults" style="display:none;">No matching records found.</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2 id="mTitle"></h2>
    <div class="subtitle" id="mSubtitle"></div>
    <div class="modal-sections" id="mSections"></div>
  </div>
</div>

;

let filteredData = [...ALL_DATA];
let sortCol = 'T/S#';
let sortDir = 1;

// Populate filter dropdowns
const patrols = [...new Set(ALL_DATA.map(r => r.Patrol).filter(Boolean))].sort();
const controllers = [...new Set(ALL_DATA.map(r => r.CONTROLLER).filter(Boolean))].sort();
patrols.forEach(p => {
  const opt = document.createElement('option'); opt.value = p; opt.textContent = p;
  document.getElementById('filterPatrol').appendChild(opt);
});
controllers.forEach(c => {
  const opt = document.createElement('option'); opt.value = c; opt.textContent = c;
  document.getElementById('filterController').appendChild(opt);
});

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const patrol = document.getElementById('filterPatrol').value;
  const ts = document.getElementById('filterTS').value;
  const ctrl = document.getElementById('filterController').value;

  filteredData = ALL_DATA.filter(r => {
    if (patrol && r.Patrol !== patrol) return false;
    if (ts && r['TS1/TS2'] !== ts) return false;
    if (ctrl && r.CONTROLLER !== ctrl) return false;
    if (q) {
      const hay = [r['T/S#'], r['MAIN STREET'], r['SIDE STREET'], r.CONTROLLER, r.MONITOR, r.BBU, r.Patrol].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  sortData();
  render();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted-asc','sorted-desc'));
  const idx = ['T/S#','MAIN STREET','SIDE STREET','CONTROLLER','MONITOR','BBU','TS1/TS2','Patrol','Relamp Date','Battery Date'].indexOf(col);
  if (idx >= 0) {
    const th = document.querySelectorAll('thead th')[idx];
    th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
  }
  sortData(); render();
}

function sortData() {
  filteredData.sort((a, b) => {
    const av = (a[sortCol] || '').toString(); const bv = (b[sortCol] || '').toString();
    return av.localeCompare(bv, undefined, {numeric: true}) * sortDir;
  });
}

function render() {
  const tbody = document.getElementById('tableBody');
  document.getElementById('stats').textContent = `Showing ${filteredData.length} of ${ALL_DATA.length} locations`;
  document.getElementById('noResults').style.display = filteredData.length === 0 ? 'block' : 'none';

  tbody.innerHTML = filteredData.map((r, i) => {
    const ts = r['TS1/TS2'];
    const badge = ts ? `<span class="badge ${ts==='TS1'?'badge-ts1':'badge-ts2'}">${ts}</span>` : '';
    return `<tr onclick="showDetail(${ALL_DATA.indexOf(r)})">
      <td class="ts-num">${r['T/S#']}</td>
      <td>${r['MAIN STREET']||''}</td>
      <td>${r['SIDE STREET']||''}</td>
      <td>${r['CONTROLLER']||''}</td>
      <td>${r['MONITOR']||''}</td>
      <td>${r['BBU']||''}</td>
      <td>${badge}</td>
      <td>${r['Patrol']||''}</td>
      <td>${r['Relamp Date']||''}</td>
      <td>${r['Battery Date']||''}</td>
    </tr>`;
  }).join('');
}

function showDetail(idx) {
  const r = ALL_DATA[idx];
  document.getElementById('mTitle').textContent = r['T/S#'] + ' — ' + (r['MAIN STREET']||'') + ' & ' + (r['SIDE STREET']||'');
  document.getElementById('mSubtitle').textContent = `Patrol: ${r.Patrol||'—'}  |  Type: ${r.Type||'—'}  |  ${r['TS1/TS2']||''}`;

  const mapsQ = encodeURIComponent((r['MAIN STREET']||'') + ' & ' + (r['SIDE STREET']||'') + ', Cook County, IL');

  const lampCols = [
    {key:'Red Ball', label:'Red Ball', color:'#ef4444'},
    {key:'Yellow Ball', label:'Yel Ball', color:'#f59e0b'},
    {key:'Green Ball', label:'Grn Ball', color:'#22c55e'},
    {key:'Red Arrow', label:'Red Arrow', color:'#ef4444'},
    {key:'Yellow Arrow', label:'Yel Arrow', color:'#f59e0b'},
    {key:'Green Arrow', label:'Grn Arrow', color:'#22c55e'},
    {key:'CD Ped', label:'CD Ped', color:'#6366f1'},
    {key:'12" DW', label:'12" DW', color:'#64748b'},
    {key:'12" W', label:'12" W', color:'#64748b'},
    {key:'3M red', label:'3M Red', color:'#ef4444'},
    {key:'3M yel', label:'3M Yel', color:'#f59e0b'},
    {key:'3M green', label:'3M Green', color:'#22c55e'},
    {key:'12V yel', label:'12V Yel', color:'#f59e0b'},
  ];

  const lampHTML = '<div class="lamp-grid">' + lampCols.map(lc => {
    const v = r[lc.key];
    if (!v) return '';
    return `<div class="lamp-cell"><div class="lc-val" style="color:${lc.color}">${v}</div><div class="lc-label">${lc.label}</div></div>`;
  }).filter(Boolean).join('') + '</div>';

  document.getElementById('mSections').innerHTML = `
    <div class="modal-section" style="grid-column:1/-1">
      <h3>Equipment</h3>
      <div class="modal-row"><span class="label">Controller</span><span class="value">${r['CONTROLLER']||'—'}</span></div>
      <div class="modal-row"><span class="label">Monitor</span><span class="value">${r['MONITOR']||'—'}</span></div>
      <div class="modal-row"><span class="label">BBU</span><span class="value">${r['BBU']||'—'}</span></div>
      <div class="modal-row"><span class="label">TS1/TS2</span><span class="value">${r['TS1/TS2']||'—'}</span></div>
    </div>
    <div class="modal-section">
      <h3>Maintenance Dates</h3>
      <div class="modal-row"><span class="label">Relamp Date</span><span class="value">${r['Relamp Date']||'—'}</span></div>
      <div class="modal-row"><span class="label">Battery Date</span><span class="value">${r['Battery Date']||'—'}</span></div>
    </div>
    <div class="modal-section">
      <h3>Info</h3>
      <div class="modal-row"><span class="label">Patrol</span><span class="value">${r['Patrol']||'—'}</span></div>
      <div class="modal-row"><span class="label">Type</span><span class="value">${r['Type']||'—'}</span></div>
    </div>
    <div class="modal-section" style="grid-column:1/-1">
      <h3>Lamp Inventory</h3>
      ${lampHTML || '<p style="color:#aaa;font-size:0.85rem">No lamp data recorded</p>'}
    </div>
    <div style="grid-column:1/-1">
      <a class="map-btn" href="https://www.google.com/maps/search/?api=1&query=${mapsQ}" target="_blank">📍 Open in Google Maps</a>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay') || e.currentTarget.classList.contains('modal-close')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal({}); });

// Init
sortData();
render();
</script>
